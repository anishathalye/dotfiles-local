- defaults:
    link:
      create: true
      relink: true

- create: ['~/.ssh']

- clean: ['~', '~/.config', '~/.ssh']

- link:
    ~/.bashrc_local_after:
    ~/.config/terminator:
      create: true
      force: true
      path: config/terminator/
    ~/.dotfiles_local: ''
    ~/.gitconfig_local:
    ~/.hgrc_local:
    ~/.shell_local_after:
    ~/.ssh/config: ssh/config
    ~/.ssh/config_local: ssh/config_local
    ~/.zshrc_local_after:

- shell:
  - git submodule sync --recursive
  - git update-submodules # after linking ~/.gitconfig
