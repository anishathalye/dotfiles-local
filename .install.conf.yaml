- defaults:
    link:
      create: true
      relink: true
    shell:
      quiet: true

- create: ['~/.ssh']

- clean: ['~', '~/.config', '~/.ssh']

- link:
    ~/.dotfiles_local: ''
    ~/.gitconfig_local:
    ~/.hgrc_local:
    ~/.shell_local_after:

- shell:
  - git submodule sync --recursive
  - git update-submodules # after linking ~/.gitconfig
